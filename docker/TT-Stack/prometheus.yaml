global:
  scrape_interval: 5s
  evaluation_interval: 5s

# Alerting (optional, add alertmanager if needed)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: []

# Recording rules for common aggregations
rule_files:
  # - "recording_rules.yml"

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
    # Relabeling to extract service name from metrics
    metric_relabel_configs:
      - source_labels: [service_name]
        target_label: service
        action: replace
      - source_labels: [__name__]
        regex: 'sally_.*'
        action: keep

  # Self-monitoring for Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Tempo metrics generator - service graph and span metrics
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
    # Keep only metrics generated by the metrics generator
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'tempo_.*|traces_.*'
        action: keep
