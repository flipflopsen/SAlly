server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:

# Metrics generator - generates service graph and span metrics from traces
metrics_generator:
  # Registry for exposing metrics
  registry:
    external_labels:
      source: tempo
      cluster: sally-dev

  # Storage configuration for the metrics generator WAL
  storage:
    path: /var/tempo/generator/wal
    remote_write_flush_deadline: 1m

  # Processor configuration
  traces_storage:
    path: /var/tempo/generator/traces

  # Service graphs processor
  processor:
    service_graphs:
      # Histogram buckets for latency metrics (in seconds)
      histogram_buckets: [0.1, 0.2, 0.4, 0.8, 1.6, 3.2, 6.4, 12.8]
      # Dimensions to add to service graph metrics
      dimensions:
        - service.name
        - service.namespace
      # Wait time for edge completion
      wait: 10s
      # Max items in the edge store
      max_items: 10000
      # Workers processing service graphs
      workers: 10

    # Span metrics processor (optional, generates additional span metrics)
    span_metrics:
      histogram_buckets: [0.002, 0.004, 0.008, 0.016, 0.032, 0.064, 0.128, 0.256, 0.512, 1.024, 2.048, 4.096, 8.192, 16.384]
      dimensions:
        - service.name
        - span.name
        - span.kind
        - status.code

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
