{% load vite %}
{% load render_vite_bundle %}
{% load pwa %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Node Graph Editor</title>

    {% if debug %}
        <script type="module" src="http://localhost:5173/@vite/client"></script>

        <!-- If you're using vite with React, this next script will be needed for HMR -->
        <script type="module">
          import RefreshRuntime from 'http://localhost:5173/@react-refresh'

          if (RefreshRuntime) {
            RefreshRuntime.injectIntoGlobalHook(window)
            window.$RefreshReg$ = () => {
            }
            window.$RefreshSig$ = () => (type) => type
            window.__vite_plugin_react_preamble_installed__ = true
          }
        </script>
    {% else %}
        {% progressive_web_app_meta %}
    {% endif %}


    <style>
        /* Prevent flash of unstyled content */
        #root {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Loading indicator */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #80EF80, #42D667);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Loading indicator while React loads -->
        <div class="loading">
            <div class="loading-spinner"></div>
        </div>
    </div>

    {% if debug %}
      <!-- This url will be different for each type of app. Point it to your main js file. -->
      <script type="module" src="http://localhost:5173/src/main.jsx"></script>
    {% else %}
      {% render_vite_bundle %}
    {% endif %}
</body>
</html>
